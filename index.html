<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>STEM Електрическа Безопасност PRO</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --text: #f1f5f9;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 15px; 
            display: flex; flex-direction: column; 
            height: 100vh; color: var(--text); 
        }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--card-bg); padding: 15px 25px; 
            border-radius: 15px; margin-bottom: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        .main-container { display: flex; gap: 20px; flex: 1; min-height: 0; }
        
        .sidebar { 
            width: 320px; background: var(--card-bg); border-radius: 15px; 
            padding: 20px; overflow-y: auto; border: 1px solid #334155;
        }

        .house { flex: 1; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; padding-right: 10px; }
        
        .circuit-box { 
            background: var(--card-bg); border-radius: 20px; 
            border: 2px solid #334155; padding: 25px; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* Прогрес бар за натоварване */
        .load-bar-container {
            width: 100%; height: 10px; background: #334155; 
            border-radius: 5px; margin: 15px 0; overflow: hidden;
        }
        .load-bar-fill {
            height: 100%; width: 0%; background: var(--success);
            transition: width 0.5s ease, background 0.5s ease;
        }

        .app-card { 
            background: #334155; border: 1px solid #475569; 
            padding: 15px; border-radius: 12px; margin-bottom: 12px; 
            cursor: pointer; transition: 0.3s; 
        }
        .app-card:hover { 
            border-color: var(--accent); background: #475569; 
            transform: translateY(-3px); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }
        
        .device-grid { display: flex; flex-wrap: wrap; gap: 15px; min-height: 90px; }
        
        .device-icon { 
            width: 80px; height: 80px; background: #0f172a; 
            border: 2px solid #334155; border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; cursor: pointer;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }
        .device-icon:hover { border-color: var(--danger); }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Ефект при пожар */
        .on-fire { 
            animation: screenShake 0.2s infinite, glowDanger 0.5s infinite alternate; 
            border-color: var(--danger) !important;
        }
        @keyframes glowDanger {
            from { box-shadow: 0 0 10px #ef4444; background: #450a0a; }
            to { box-shadow: 0 0 40px #ef4444; background: #7f1d1d; }
        }
        @keyframes screenShake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }

        .budget-box { font-size: 24px; font-weight: bold; text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        
        select { 
            padding: 10px; border-radius: 10px; background: #0f172a; 
            color: white; border: 1px solid #475569; cursor: pointer;
        }

        .status-tag { 
            padding: 6px 15px; border-radius: 20px; font-size: 12px; 
            font-weight: bold; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="header">
    <div style="display: flex; align-items: center; gap: 15px;">
        <span style="font-size: 32px;">⚡</span>
        <div>
            <h2 style="margin:0;">Инженерна Симулация</h2>
            <small style="color: #94a3b8;">Проектиране на безопасна мрежа</small>
        </div>
    </div>
    <div class="budget-box">Бюджет: <span id="budget" style="color: var(--success);">250</span> €</div>
</div>

<div class="main-container">
    <div class="sidebar">
        <h3 style="margin-top:0; border-bottom: 1px solid #334155; padding-bottom: 10px;">📦 Уреди</h3>
        <div id="catalog"></div>
    </div>

    <div class="house">
        <div id="box-1" class="circuit-box">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <b style="color: var(--accent); font-size: 18px;">🔵 КРЪГ А (Дневна)</b>
                <span id="status-1" class="status-tag" style="background: var(--success);">СИСТЕМАТА Е OK</span>
            </div>
            
            <div class="load-bar-container">
                <div id="bar-1" class="load-bar-fill"></div>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <select id="wire-1" onchange="updateSystem()">
                    <option value="1.5">Кабел 1.5mm² (13A limit)</option>
                    <option value="2.5">Кабел 2.5mm² (20A limit)</option>
                    <option value="4.0">Кабел 4.0mm² (28A limit)</option>
                </select>
                <select id="fuse-1" onchange="updateSystem()">
                    <option value="10">Бушон 10A</option>
                    <option value="16" selected>Бушон 16A</option>
                    <option value="25">Бушон 25A</option>
                </select>
            </div>
            
            <div id="grid-1" class="device-grid"></div>
            <div style="margin-top:15px; color: #94a3b8; font-size: 14px;">
                Натоварване: <b id="i-1" style="color: white;">0.00</b> A / <b id="p-1" style="color: white;">0</b> W
            </div>
        </div>

        <div id="box-2" class="circuit-box">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <b style="color: #f59e0b; font-size: 18px;">🟠 КРЪГ Б (Кухня)</b>
                <span id="status-2" class="status-tag" style="background: var(--success);">СИСТЕМАТА Е OK</span>
            </div>

            <div class="load-bar-container">
                <div id="bar-2" class="load-bar-fill"></div>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <select id="wire-2" onchange="updateSystem()">
                    <option value="1.5">Кабел 1.5mm² (13A limit)</option>
                    <option value="2.5">Кабел 2.5mm² (20A limit)</option>
                    <option value="4.0">Кабел 4.0mm² (28A limit)</option>
                </select>
                <select id="fuse-2" onchange="updateSystem()">
                    <option value="10">Бушон 10A</option>
                    <option value="16" selected>Бушон 16A</option>
                    <option value="25">Бушон 25A</option>
                </select>
            </div>

            <div id="grid-2" class="device-grid"></div>
            <div style="margin-top:15px; color: #94a3b8; font-size: 14px;">
                Натоварване: <b id="i-2" style="color: white;">0.00</b> A / <b id="p-2" style="color: white;">0</b> W
            </div>
        </div>
    </div>
</div>

<script>
    const appliances = [
        { name: "Готварска печка", icon: "🔥", p: 3000, price: 60 },
        { name: "Бойлер", icon: "🚿", p: 2500, price: 55 },
        { name: "Пералня", icon: "🧺", p: 2200, price: 40 },
        { name: "Ел. кана", icon: "🫖", p: 2000, price: 15 },
        { name: "Микровълнова", icon: "🍱", p: 1200, price: 25 },
        { name: "Компютър", icon: "🖥️", p: 500, price: 30 },
        { name: "Телевизор", icon: "📺", p: 150, price: 20 }
    ];

    let circuits = { 1: [], 2: [] };

    function init() {
        const cat = document.getElementById('catalog');
        appliances.forEach((a, i) => {
            cat.innerHTML += `
                <div class="app-card" onclick="addDevice(${i})">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${a.icon} ${a.name}</b>
                        <span style="color: #10b981;">${a.price} €</span>
                    </div>
                    <div style="font-size:12px; color: #94a3b8; margin-top:5px;">Мощност: ${a.p}W</div>
                </div>`;
        });
        updateSystem();
    }

    function addDevice(idx) {
        const dev = { ...appliances[idx], uid: Date.now() };
        if (circuits[1].length <= circuits[2].length) circuits[1].push(dev);
        else circuits[2].push(dev);
        updateSystem();
    }

    function removeDevice(cNum, uid) {
        circuits[cNum] = circuits[cNum].filter(d => d.uid !== uid);
        updateSystem();
    }

    function updateSystem() {
        let budget = 250;
        
        for (let n = 1; n <= 2; n++) {
            const wireVal = parseFloat(document.getElementById('wire-' + n).value);
            const fuseVal = parseInt(document.getElementById('fuse-' + n).value);
            const grid = document.getElementById('grid-' + n);
            const bar = document.getElementById('bar-' + n);
            const status = document.getElementById('status-' + n);
            const box = document.getElementById('box-' + n);

            // Разходи
            if (wireVal == 1.5) budget -= 10;
            else if (wireVal == 2.5) budget -= 20;
            else if (wireVal == 4.0) budget -= 40;
            budget -= (fuseVal > 16 ? 10 : 5);

            grid.innerHTML = '';
            let pTotal = 0;
            circuits[n].forEach(d => {
                pTotal += d.p;
                budget -= d.price;
                grid.innerHTML += `
                    <div class="device-icon" onclick="removeDevice(${n}, ${d.uid})">
                        <span style="font-size: 24px;">${d.icon}</span>
                        <small style="font-size: 10px; color: #94a3b8;">${d.p}W</small>
                    </div>`;
            });

            const iTotal = pTotal / 220;
            const wireLimit = wireVal === 1.5 ? 13 : (wireVal === 2.5 ? 20 : 28);
            
            // Визуализация на лентата
            const percent = Math.min((iTotal / fuseVal) * 100, 100);
            bar.style.width = percent + '%';
            
            document.getElementById('i-' + n).innerText = iTotal.toFixed(2);
            document.getElementById('p-' + n).innerText = pTotal;

            // Логика за цветовете
            box.classList.remove('on-fire');
            if (iTotal > fuseVal) {
                status.innerText = "🛑 БУШОНЪТ ПАДНА";
                status.style.background = "#f59e0b";
                bar.style.background = "#f59e0b";
            } else if (iTotal > wireLimit) {
                status.innerText = "🧨 ПОЖАР: КАБЕЛ!";
                status.style.background = "#ef4444";
                bar.style.background = "#ef4444";
                box.classList.add('on-fire');
            } else {
                status.innerText = "✅ СИСТЕМАТА Е OK";
                status.style.background = "#10b981";
                bar.style.background = (percent > 80) ? "#fbbf24" : "#10b981";
            }
        }

        const budgetEl = document.getElementById('budget');
        budgetEl.innerText = budget;
        budgetEl.style.color = budget < 0 ? "#ef4444" : "#10b981";
    }

    window.onload = init;
</script>
</body>
</html>
