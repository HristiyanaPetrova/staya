<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>STEM Инженер 2.2: Професионално проектиране</title>
    <style>
        :root { --bg: #f0f2f5; --panel: #ffffff; --accent: #2563eb; --text: #1e293b; --danger: #ef4444; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        .layout { display: flex; gap: 20px; width: 100%; max-width: 1400px; height: 75vh; }
        
        #viewport { 
            flex: 3; background: #cbd5e1; border-radius: 20px; position: relative; 
            overflow: hidden; box-shadow: inset 0 0 50px rgba(0,0,0,0.1); border: 4px solid #94a3b8;
        }

        /* 3D стая визуализация */
        .room-base {
            position: absolute; width: 80%; height: 70%; top: 15%; left: 10%;
            background: #f8fafc; transform: perspective(1000px) rotateX(20deg);
            border: 2px solid #94a3b8; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            background-image: linear-gradient(#e2e8f0 1px, transparent 1px), linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .help-box { 
            position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.9); 
            padding: 12px; border-radius: 12px; border-left: 6px solid var(--accent); 
            font-size: 13px; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .sidebar { flex: 1; background: var(--panel); padding: 20px; border-radius: 20px; overflow-y: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .item-btn { 
            width: 100%; padding: 14px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 12px; 
            background: #fff; cursor: pointer; display: flex; align-items: center; transition: all 0.2s;
        }
        .item-btn:hover { border-color: var(--accent); background: #f1f5f9; transform: translateY(-2px); }
        .item-btn b { font-size: 28px; margin-right: 15px; }

        .placed-obj { 
            position: absolute; cursor: grab; z-index: 20; text-align: center; 
            padding: 10px; transition: transform 0.1s;
        }
        .placed-obj:active { cursor: grabbing; }
        .placed-obj .icon { font-size: 65px; filter: drop-shadow(0 10px 8px rgba(0,0,0,0.1)); }
        .placed-obj .tag { background: var(--text); color: #fff; padding: 3px 8px; border-radius: 6px; font-size: 12px; margin-top: 5px; font-weight: bold; }

        #cable-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .hud { 
            width: 100%; max-width: 1400px; background: #0f172a; color: #fff; 
            margin-top: 20px; padding: 25px; border-radius: 20px; display: flex; justify-content: space-around;
        }
        .hud-item { text-align: center; }
        .hud-item label { display: block; font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .hud-item b { color: #fbbf24; font-size: 32px; }

        .wire-mode { cursor: crosshair !important; background: #e0f2fe !important; }
        .selected { transform: scale(1.1); filter: drop-shadow(0 0 15px #3b82f6); }
    </style>
</head>
<body>

    <h2 style="color: var(--text); margin: 10px 0;">⚡ STEM Инженер: Електрически мрежи</h2>

    <div class="layout">
        <div id="viewport">
            <div class="help-box">
                <b>💡 Инструкция:</b><br>
                1. Добави <b>Контакт</b> 🔲 и <b>Уреди</b> 🖥️<br>
                2. Подреди ги в стаята (влачи с мишката)<br>
                3. Натисни <b>СВЪРЖИ КАБЕЛИ</b><br>
                4. Кликни Уреда + Кликни Контакта
            </div>
            <div class="room-base"></div>
            <svg id="cable-layer"></svg>
        </div>

        <div class="sidebar">
            <button id="wire-btn" onclick="toggleWireMode()" style="width:100%; padding:18px; background:var(--accent); color:white; border:none; border-radius:15px; font-weight:bold; cursor:pointer; margin-bottom:20px; font-size: 16px; box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);">🔌 СВЪРЖИ КАБЕЛИ (ИЗКЛ.)</button>
            
            <p style="font-weight: bold; font-size: 14px; color: #64748b;">МРЕЖА:</p>
            <button class="item-btn" onclick="spawn('🔲', 'Контакт', 0)"><b>🔲</b> Контакт (220V)</button>
            
            <p style="font-weight: bold; font-size: 14px; color: #64748b;">КОНСУМАТОРИ:</p>
            <button class="item-btn" onclick="spawn('🖥️', 'Компютър', 500)"><b>🖥️</b> Компютър (500W)</button>
            <button class="item-btn" onclick="spawn('🔥', 'Печка', 2200)"><b>🔥</b> Печка (2200W)</button>
            <button class="item-btn" onclick="spawn('💡', 'Лампа', 60)"><b>💡</b> Лампа (60W)</button>
            <button class="item-btn" onclick="spawn('❄️', 'Хладилник', 1000)"><b>❄️</b> Хладилник (1000W)</button>
            <button class="item-btn" onclick="spawn('📺', 'Телевизор', 150)"><b>📺</b> Телевизор (150W)</button>
            
            <button onclick="location.reload()" style="margin-top:20px; width:100%; padding:12px; background:#f1f5f9; color:#64748b; border:1px solid #e2e8f0; border-radius:12px; cursor:pointer; font-weight: 500;">НУЛИРАЙ ПРОЕКТА</button>
        </div>
    </div>

    <div class="hud">
        <div class="hud-item"><label>Обща Мощност</label><b id="p-val">0 W</b></div>
        <div class="hud-item"><label>Големина на тока (I)</label><b id="i-val">0.00 A</b></div>
        <div class="hud-item"><label>Напрежение (U)</label><b>220 V</b></div>
        <div class="hud-item"><label>Предпазител</label><b>16 A</b></div>
    </div>

    <script>
        let wireMode = false;
        let firstClick = null;
        let components = [];
        let connections = [];

        function spawn(icon, name, power) {
            const id = 'id' + Date.now();
            const div = document.createElement('div');
            div.className = 'placed-obj';
            div.id = id;

            // Генериране на случайно място, за да не се застъпват
            const rect = document.getElementById('viewport').getBoundingClientRect();
            const randomX = Math.random() * (rect.width - 150) + 50;
            const randomY = Math.random() * (rect.height - 150) + 50;
            
            div.style.left = randomX + 'px';
            div.style.top = randomY + 'px';
            div.innerHTML = `<div class="icon">${icon}</div><div class="tag">${name}</div>`;
            
            div.onmousedown = (e) => {
                if(wireMode) {
                    handleWire(id);
                    return;
                }
                const rectVP = document.getElementById('viewport').getBoundingClientRect();
                const shiftX = e.clientX - div.getBoundingClientRect().left;
                const shiftY = e.clientY - div.getBoundingClientRect().top;

                document.onmousemove = (e) => {
                    div.style.left = (e.clientX - rectVP.left - shiftX) + 'px';
                    div.style.top = (e.clientY - rectVP.top - shiftY) + 'px';
                    drawWires();
                };
                document.onmouseup = () => document.onmousemove = null;
            };

            document.getElementById('viewport').appendChild(div);
            components.push({ id, name, power, type: power > 0 ? 'load' : 'source' });
        }

        function handleWire(id) {
            if(!firstClick) {
                firstClick = id;
                document.getElementById(id).classList.add('selected');
            } else {
                if(firstClick !== id) {
                    // Проверка дали вече съществува такава връзка
                    const exists = connections.some(c => (c[0] === firstClick && c[1] === id) || (c[0] === id && c[1] === firstClick));
                    if(!exists) {
                        connections.push([firstClick, id]);
                        drawWires();
                        updatePhysics();
                    }
                }
                document.getElementById(firstClick).classList.remove('selected');
                firstClick = null;
            }
        }

        function drawWires() {
            const svg = document.getElementById('cable-layer');
            svg.innerHTML = '';
            connections.forEach(conn => {
                const el1 = document.getElementById(conn[0]);
                const el2 = document.getElementById(conn[1]);
                if(el1 && el2) {
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    // Свързваме центровете на обектите
                    line.setAttribute("x1", parseInt(el1.style.left) + 40);
                    line.setAttribute("y1", parseInt(el1.style.top) + 40);
                    line.setAttribute("x2", parseInt(el2.style.left) + 40);
                    line.setAttribute("y2", parseInt(el2.style.top) + 40);
                    line.setAttribute("stroke", "#334155");
                    line.setAttribute("stroke-width", "5");
                    line.setAttribute("stroke-linecap", "round");
                    svg.appendChild(line);
                }
            });
        }

        function updatePhysics() {
            let activePower = 0;
            connections.forEach(conn => {
                const c1 = components.find(c => c.id === conn[0]);
                const c2 = components.find(c => c.id === conn[1]);
                // Ако единият е консуматор, а другият източник
                if((c1.type === 'load' && c2.type === 'source') || (c1.type === 'source' && c2.type === 'load')) {
                    activePower += (c1.power + c2.power);
                }
            });

            document.getElementById('p-val').innerText = activePower + " W";
            const current = activePower / 220;
            document.getElementById('i-val').innerText = current.toFixed(2) + " A";
            
            if(current > 16) {
                document.getElementById('i-val').style.color = '#ef4444';
                setTimeout(() => alert("⚠️ ПРЕТОВАРВАНЕ! Токът надвиши 16 Ампера. Предпазителят се изключи."), 100);
            } else {
                document.getElementById('i-val').style.color = '#fbbf24';
            }
        }

        function toggleWireMode() {
            wireMode = !wireMode;
            document.getElementById('viewport').classList.toggle('wire-mode');
            document.getElementById('wire-btn').innerText = wireMode ? "🔌 РЕЖИМ: КАБЕЛИ (ВКЛ.)" : "🔌 СВЪРЖИ КАБЕЛИ (ИЗКЛ.)";
            document.getElementById('wire-btn').style.background = wireMode ? "#10b981" : "#2563eb";
            if(!wireMode && firstClick) {
                document.getElementById(firstClick).classList.remove('selected');
                firstClick = null;
            }
        }
    </script>
</body>
</html>
