<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>STEM Инженер 2.1: Свързване на вериги</title>
    <style>
        :root { --bg: #fdf6e3; --panel: #eee8d5; --accent: #268bd2; --text: #073642; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .layout { display: flex; gap: 20px; width: 100%; max-width: 1400px; height: 80vh; }
        
        #viewport { 
            flex: 3; background: #fff; border: 3px solid var(--panel); border-radius: 15px; 
            position: relative; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Помощен панел */
        .help-box { 
            position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9); 
            padding: 10px; border-radius: 8px; border-left: 5px solid var(--accent); font-size: 13px; z-index: 100;
        }

        .sidebar { flex: 1; background: var(--panel); padding: 20px; border-radius: 15px; overflow-y: auto; }
        
        .item-btn { 
            width: 100%; padding: 12px; margin-bottom: 8px; border: none; border-radius: 8px; 
            background: #fff; cursor: pointer; display: flex; align-items: center; transition: 0.2s;
        }
        .item-btn:hover { background: #eee; transform: translateX(5px); }
        .item-btn b { font-size: 24px; margin-right: 15px; }

        .placed-obj { position: absolute; cursor: move; z-index: 20; text-align: center; }
        .placed-obj .icon { font-size: 55px; }
        .placed-obj .tag { background: var(--text); color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; }

        #cable-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .hud { 
            width: 100%; max-width: 1400px; background: var(--text); color: #fff; 
            margin-top: 15px; padding: 20px; border-radius: 12px; display: flex; justify-content: space-around;
        }
        .hud b { color: #f1c40f; font-size: 22px; }

        .wire-mode { cursor: crosshair; }
        .selected { filter: drop-shadow(0 0 10px orange); }
    </style>
</head>
<body>

    <h2>⚡ Проектиране на електрическа верига в 7. клас</h2>

    <div class="layout">
        <div id="viewport">
            <div class="help-box">
                <strong>Как се работи:</strong><br>
                1. Сложи <b>Контакт</b> 🔲.<br>
                2. Сложи <b>Уред</b> (напр. Печка 🔥).<br>
                3. Натисни <b>СВЪРЖИ КАБЕЛИ</b>.<br>
                4. Кликни върху Уреда, после върху Контакта.
            </div>
            <svg id="cable-layer"></svg>
        </div>

        <div class="sidebar">
            <button id="wire-btn" onclick="toggleWireMode()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer; margin-bottom:20px;">🔌 СВЪРЖИ КАБЕЛИ (ИЗКЛ.)</button>
            
            <p><b>Източници:</b></p>
            <button class="item-btn" onclick="spawn('🔲', 'Контакт', 0)"><b>🔲</b> Контакт (220V)</button>
            
            <p><b>Консуматори:</b></p>
            <button class="item-btn" onclick="spawn('🖥️', 'Компютър', 500)"><b>🖥️</b> Компютър (500W)</button>
            <button class="item-btn" onclick="spawn('🔥', 'Печка', 2200)"><b>🔥</b> Печка (2200W)</button>
            <button class="item-btn" onclick="spawn('💡', 'Лампа', 60)"><b>💡</b> Лампа (60W)</button>
            <button class="item-btn" onclick="spawn('❄️', 'Хладилник', 1000)"><b>❄️</b> Хладилник (1000W)</button>
            
            <button onclick="location.reload()" style="margin-top:30px; width:100%; padding:10px; background:#dc322f; color:white; border:none; border-radius:5px; cursor:pointer;">ИЗЧИСТИ ВСИЧКО</button>
        </div>
    </div>

    <div class="hud">
        <div>Обща Мощност: <b id="p-val">0 W</b></div>
        <div>Ток в мрежата (I): <b id="i-val">0.00 A</b></div>
        <div>Напрежение (U): <b>220 V</b></div>
        <div>Предпазител: <b>16 A</b></div>
    </div>

    <script>
        let wireMode = false;
        let firstClick = null;
        let components = [];
        let connections = [];

        function spawn(icon, name, power) {
            const id = 'id' + Date.now();
            const div = document.createElement('div');
            div.className = 'placed-obj';
            div.id = id;
            div.style.left = '50px'; div.style.top = '150px';
            div.innerHTML = `<div class="icon">${icon}</div><div class="tag">${name}</div>`;
            
            div.onmousedown = (e) => {
                if(wireMode) {
                    handleWire(id);
                    return;
                }
                let rect = document.getElementById('viewport').getBoundingClientRect();
                document.onmousemove = (e) => {
                    div.style.left = (e.clientX - rect.left - 25) + 'px';
                    div.style.top = (e.clientY - rect.top - 25) + 'px';
                    drawWires();
                };
                document.onmouseup = () => document.onmousemove = null;
            };

            document.getElementById('viewport').appendChild(div);
            components.push({ id, name, power, type: power > 0 ? 'load' : 'source' });
        }

        function handleWire(id) {
            if(!firstClick) {
                firstClick = id;
                document.getElementById(id).classList.add('selected');
            } else {
                if(firstClick !== id) {
                    connections.push([firstClick, id]);
                    drawWires();
                    updatePhysics();
                }
                document.getElementById(firstClick).classList.remove('selected');
                firstClick = null;
            }
        }

        function drawWires() {
            const svg = document.getElementById('cable-layer');
            svg.innerHTML = '';
            connections.forEach(conn => {
                const el1 = document.getElementById(conn[0]);
                const el2 = document.getElementById(conn[1]);
                if(el1 && el2) {
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", parseInt(el1.style.left) + 30);
                    line.setAttribute("y1", parseInt(el1.style.top) + 30);
                    line.setAttribute("x2", parseInt(el2.style.left) + 30);
                    line.setAttribute("y2", parseInt(el2.style.top) + 30);
                    line.setAttribute("stroke", "#444");
                    line.setAttribute("stroke-width", "4");
                    svg.appendChild(line);
                }
            });
        }

        function updatePhysics() {
            let activePower = 0;
            // Логика: Уредът хаби ток само ако е свързан към контакт
            connections.forEach(conn => {
                const c1 = components.find(c => c.id === conn[0]);
                const c2 = components.find(c => c.id === conn[1]);
                if((c1.type === 'load' && c2.type === 'source') || (c1.type === 'source' && c2.type === 'load')) {
                    activePower += (c1.power + c2.power);
                }
            });

            document.getElementById('p-val').innerText = activePower + " W";
            const current = activePower / 220;
            document.getElementById('i-val').innerText = current.toFixed(2) + " A";
            
            if(current > 16) {
                document.getElementById('i-val').style.color = '#dc322f';
                alert("💥 ПРЕТОВАРВАНЕ! Предпазителят падна!");
            } else {
                document.getElementById('i-val').style.color = '#f1c40f';
            }
        }

        function toggleWireMode() {
            wireMode = !wireMode;
            document.getElementById('viewport').classList.toggle('wire-mode');
            document.getElementById('wire-btn').innerText = wireMode ? "🔌 РЕЖИМ: КАБЕЛИ (ВКЛ.)" : "🔌 СВЪРЖИ КАБЕЛИ (ИЗКЛ.)";
            document.getElementById('wire-btn').style.background = wireMode ? "#859900" : "#268bd2";
        }
    </script>
</body>
</html>
