<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>STEM Електрическа Безопасност 4.3</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f1f5f9; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; color: #0f172a; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #0f172a; color: white; padding: 10px 20px; border-radius: 12px; margin-bottom: 15px; flex-shrink: 0; }
        .main-container { display: flex; gap: 15px; flex: 1; min-height: 0; }
        
        .sidebar { width: 300px; background: white; border-radius: 15px; padding: 15px; overflow-y: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .house { flex: 1; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-right: 5px; }
        
        .circuit-box { background: white; border-radius: 15px; border: 3px solid #e2e8f0; padding: 20px; transition: 0.3s; }
        .config-zone { border-bottom: 2px dashed #e2e8f0; padding-bottom: 15px; margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        .app-card { border: 1px solid #e2e8f0; padding: 12px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; background: #fff; transition: 0.2s; }
        .app-card:hover { border-color: #3b82f6; background: #eff6ff; transform: translateX(5px); }
        
        .device-grid { display: flex; flex-wrap: wrap; gap: 12px; min-height: 80px; align-items: flex-start; }
        .device-icon { width: 70px; height: 70px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: 0.2s; }
        .device-icon:hover { border-color: #ef4444; background: #fef2f2; }
        
        .status-tag { padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; color: white; background: #10b981; }
        
        .on-fire { animation: burn 0.5s infinite alternate; border-color: #ef4444 !important; background: #fee2e2 !important; }
        @keyframes burn { from { box-shadow: 0 0 5px red; } to { box-shadow: 0 0 25px orange; } }
        
        .budget-box { font-size: 22px; font-weight: bold; color: #10b981; }
        select { padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1; background: white; cursor: pointer; }
        .info-text { font-size: 13px; color: #64748b; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div style="display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 24px;">⚡</span>
        <h2 style="margin:0;">STEM Проектиране: Електрическа Безопасност</h2>
    </div>
    <div class="budget-box">Бюджет: <span id="budget">250</span> €</div>
</div>

<div class="main-container">
    <div class="sidebar">
        <h3 style="margin-top:0;">📦 Склад за уреди</h3>
        <p style="font-size: 12px; color: #64748b;">Кликни, за да добавиш уред в къщата:</p>
        <div id="catalog"></div>
        <button onclick="location.reload()" style="width:100%; margin-top:20px; padding:12px; border:none; background:#e2e8f0; border-radius:10px; cursor:pointer; font-weight:bold;">НУЛИРАЙ</button>
    </div>

    <div class="house">
        <div id="box-1" class="circuit-box">
            <div class="config-zone">
                <b style="color:#3b82f6">🔵 КРЪГ А:</b>
                <select id="wire-1" onchange="updateSystem()">
                    <option value="1.5">Кабел 1.5 mm² (13A) - 10€</option>
                    <option value="2.5">Кабел 2.5 mm² (20A) - 20€</option>
                    <option value="4.0">Кабел 4.0 mm² (28A) - 35€</option>
                </select>
                <select id="fuse-1" onchange="updateSystem()">
                    <option value="10">Бушон 10A - 3€</option>
                    <option value="16">Бушон 16A - 3€</option>
                    <option value="25">Бушон 25A - 5€</option>
                    <option value="32">Бушон 32A - 5€</option>
                </select>
                <span id="status-1" class="status-tag">СИСТЕМАТА Е OK</span>
            </div>
            <div id="grid-1" class="device-grid"></div>
            <div class="info-text">Ток: <b id="i-1" style="color:#0f172a">0.00</b> A | Мощност: <b id="p-1" style="color:#0f172a">0</b> W</div>
        </div>

        <div id="box-2" class="circuit-box">
            <div class="config-zone">
                <b style="color:#f59e0b">🟠 КРЪГ Б:</b>
                <select id="wire-2" onchange="updateSystem()">
                    <option value="1.5">Кабел 1.5 mm² (13A) - 10€</option>
                    <option value="2.5">Кабел 2.5 mm² (20A) - 20€</option>
                    <option value="4.0">Кабел 4.0 mm² (28A) - 35€</option>
                </select>
                <select id="fuse-2" onchange="updateSystem()">
                    <option value="10">Бушон 10A - 3€</option>
                    <option value="16">Бушон 16A - 3€</option>
                    <option value="25">Бушон 25A - 5€</option>
                    <option value="32">Бушон 32A - 5€</option>
                </select>
                <span id="status-2" class="status-tag">СИСТЕМАТА Е OK</span>
            </div>
            <div id="grid-2" class="device-grid"></div>
            <div class="info-text">Ток: <b id="i-2" style="color:#0f172a">0.00</b> A | Мощност: <b id="p-2" style="color:#0f172a">0</b> W</div>
        </div>
    </div>
</div>

<script>
    const appliances = [
        { name: "Печка", icon: "🔥", p: 3200, price: 60 },
        { name: "Бойлер", icon: "🚿", p: 2500, price: 50 },
        { name: "Климатик", icon: "❄️", p: 1800, price: 75 },
        { name: "Пералня", icon: "🧺", p: 2200, price: 45 },
        { name: "Ел. кана", icon: "🫖", p: 2000, price: 15 },
        { name: "Компютър", icon: "🖥️", p: 500, price: 20 },
        { name: "Ютия", icon: "🧶", p: 1500, price: 10 }
    ];

    let circuits = { 1: [], 2: [] };

    function renderCatalog() {
        const cat = document.getElementById('catalog');
        cat.innerHTML = '';
        appliances.forEach((a, i) => {
            cat.innerHTML += `
                <div class="app-card" onclick="addDevice(${i})">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${a.icon} ${a.name}</b>
                        <b style="color:#3b82f6">${a.price} €</b>
                    </div>
                    <div style="font-size:11px; color:#64748b; margin-top:4px;">${a.p}W | ~${(a.p/220).toFixed(1)}A</div>
                </div>`;
        });
    }

    function addDevice(idx) {
        const dev = { ...appliances[idx], uid: Date.now() };
        if (circuits[1].length <= circuits[2].length) circuits[1].push(dev);
        else circuits[2].push(dev);
        updateSystem();
    }

    function removeDevice(cNum, uid) {
        circuits[cNum] = circuits[cNum].filter(d => d.uid !== uid);
        updateSystem();
    }

    function updateSystem() {
        let currentBudget = 250;
        
        for (let n = 1; n <= 2; n++) {
            const wireVal = parseFloat(document.getElementById('wire-' + n).value);
            const fuseVal = parseInt(document.getElementById('fuse-' + n).value);
            const grid = document.getElementById('grid-' + n);
            const status = document.getElementById('status-' + n);
            const box = document.getElementById('box-' + n);

            // Бюджет за кабели
            if (wireVal === 1.5) currentBudget -= 10;
            else if (wireVal === 2.5) currentBudget -= 20;
            else if (wireVal === 4.0) currentBudget -= 35;
            
            // Бюджет за бушони
            currentBudget -= (fuseVal > 20 ? 5 : 3);

            grid.innerHTML = '';
            let pTotal = 0;
            circuits[n].forEach(d => {
                pTotal += d.p;
                currentBudget -= d.price;
                grid.innerHTML += `
                    <div class="device-icon" onclick="removeDevice(${n}, ${d.uid})">
                        ${d.icon}
                        <span style="font-size:9px; color:#64748b; margin-top:2px;">${d.p}W</span>
                        <div style="position:absolute; top:-5px; right:-5px; background:#ef4444; color:white; border-radius:50%; width:14px; height:14px; font-size:10px; display:flex; align-items:center; justify-content:center;">✕</div>
                    </div>`;
            });

            let iTotal = pTotal / 220;
            document.getElementById('i-' + n).innerText = iTotal.toFixed(2);
            document.getElementById('p-' + n).innerText = pTotal;

            const wireLimit = wireVal === 1.5 ? 13 : (wireVal === 2.5 ? 20 : 28);
            box.classList.remove('on-fire');

            if (iTotal > fuseVal) {
                status.innerText = "🚨 БУШОНЪТ ИЗКЛЮЧИ";
                status.style.background = "#f59e0b";
            } else if (iTotal > wireLimit) {
                status.innerText = "🔥 ПОЖАР: КАБЕЛЪТ ПРЕТОВАРИ!";
                status.style.background = "#ef4444";
                box.classList.add('on-fire');
            } else {
                status.innerText = "✅ СИСТЕМАТА Е OK";
                status.style.background = "#10b981";
            }
        }
        
        const budgetEl = document.getElementById('budget');
        budgetEl.innerText = currentBudget;
        budgetEl.style.color = currentBudget < 0 ? "#ef4444" : "#10b981";
    }

    window.onload = renderCatalog;
</script>
</body>
</html>
