<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>STEM Архитект: Мисия Електричество</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; padding: 10px; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Скриване на елементи при печат */
        @media print {
            .sidebar, .header button, .controls, .remove-btn, .tasks-panel { display: none !important; }
            body { background: white; color: black; overflow: visible; }
            .main-layout { display: block; }
            .room { border: 2px solid #000 !important; background: white !important; margin-bottom: 20px; page-break-inside: avoid; }
            .room-label { color: black !important; border: 1px solid #000; }
            .placed-item { border: 1px solid #000 !important; color: black !important; }
        }

        .header { background: #1e293b; padding: 10px 20px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .main-layout { display: flex; gap: 15px; flex: 1; min-height: 0; }
        
        /* Склад */
        .sidebar { width: 220px; background: #1e293b; padding: 10px; border-radius: 10px; border: 1px solid #334155; overflow-y: auto; flex-shrink: 0; }
        .source-item { background: #334155; border: 1px solid #475569; padding: 8px; border-radius: 6px; margin-bottom: 8px; cursor: grab; display: flex; align-items: center; gap: 8px; font-size: 13px; }

        /* Задачи */
        .tasks-panel { width: 250px; background: #0f172a; padding: 10px; border-radius: 10px; border: 1px solid #3b82f6; overflow-y: auto; font-size: 13px; }
        .task-card { background: #1e293b; padding: 10px; border-radius: 6px; margin-bottom: 10px; border-left: 4px solid #3b82f6; }
        .task-done { border-left-color: #10b981; opacity: 0.7; }

        .rooms-container { flex: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .room { background: #1e293b; border: 3px solid #475569; border-radius: 12px; position: relative; flex: 1; min-height: 200px; background-image: radial-gradient(#2d3748 1px, transparent 1px); background-size: 20px 20px; }
        .room-label { position: absolute; top: 8px; left: 10px; font-weight: bold; font-size: 14px; background: rgba(15, 23, 42, 0.8); padding: 3px 8px; border-radius: 4px; z-index: 10; }

        .overload-msg { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; z-index: 20; display: none; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .placed-item { position: absolute; width: 50px; height: 50px; background: #0f172a; border: 2px solid #3b82f6; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: move; font-size: 20px; z-index: 5; }
        .placed-item small { font-size: 8px; color: #94a3b8; }
        .remove-btn { position: absolute; top: -10px; right: -10px; background: #ef4444; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #1e293b; }

        .controls { position: absolute; top: 8px; right: 10px; display: flex; gap: 5px; z-index: 10; }
        select { background: #0f172a; color: white; border: 1px solid #475569; padding: 2px; border-radius: 4px; font-size: 11px; }
