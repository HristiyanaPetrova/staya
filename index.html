<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>STEM Архитект: Електрически Проект</title>
    <style>
        :root {
            --bg: #0f172a; --card-bg: #1e293b; --accent: #3b82f6;
            --danger: #ef4444; --success: #10b981; --text: #f1f5f9;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        
        /* Специфични стилове за печат */
        @media print {
            .sidebar, .controls-bar, button { display: none !important; }
            body { background: white; color: black; }
            .circuit-box { border: 2px solid #000 !important; page-break-inside: avoid; background: white !important; color: black !important; }
            .load-bar-container { border: 1px solid #000; }
        }

        .header { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 15px 25px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        .main-container { display: flex; gap: 20px; flex: 1; min-height: 0; }
        
        .sidebar { width: 300px; background: var(--card-bg); border-radius: 15px; padding: 20px; overflow-y: auto; border: 1px solid #334155; }
        .house-canvas { flex: 1; display: grid; grid-template-rows: 1fr 1fr; gap: 20px; overflow-y: auto; padding-right: 10px; }
        
        /* Стая стил */
        .room { 
            background: #2d3748; border-radius: 20px; border: 4px solid #4a5568; padding: 20px; 
            position: relative; transition: 0.3s; background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 20px 20px;
        }
        .room::before { content: "🪟"; position: absolute; top: -15px; left: 50%; font-size: 24px; background: var(--bg); padding: 0 10px; }
        .room::after { content: "🚪"; position: absolute; bottom: -15px; left: 20px; font-size: 24px; background: var(--bg); padding: 0 5px; }

        .load-bar-container { width: 100%; height: 8px; background: #1a202c; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .load-bar-fill { height: 100%; width: 0%; background: var(--success); transition: 0.5s; }

        .app-card { background: #334155; border: 1px solid #475569; padding: 10px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .app-card:hover { transform: scale(1.02); border-color: var(--accent); }
        
        .device-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 15px; min-height: 100px; }
        .device-icon { 
            width: 70px; height: 70px; background: rgba(15, 23, 42, 0.8); border: 2px solid #4a5568; 
            border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            position: relative; cursor: pointer; animation: fadeIn 0.3s;
        }
        
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; margin-left: 5px; }
        .btn-print { background: var(--accent); color: white; }
        .btn-reset { background: var(--danger); color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .on-fire { animation: shake 0.2s infinite; border-color: var(--danger) !important; box-shadow: 0 0 20px var(--danger); }
        @keyframes shake { 0% { transform: rotate(0deg); } 25% { transform: rotate(1deg); } 75% { transform: rotate(-1deg); } 100% { transform: rotate(0deg); } }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h2 style="margin:0;">🏠 STEM Архитект: Електрически План</h2>
        <div id="budget-info" style="font-weight: bold;">Оставащ бюджет: <span id="budget">250</span> €</div>
    </div>
    <div class="controls-bar">
