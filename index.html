<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>STEM Архитект 6.0</title>
    <style>
        /* Базови стилове, които не блокират браузъра */
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #334155; }
        .content { display: flex; gap: 20px; flex: 1; overflow: hidden; }
        
        .sidebar { width: 250px; background: #1e293b; padding: 15px; border-radius: 10px; overflow-y: auto; border: 1px solid #334155; }
        .main { flex: 1; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        
        .room { background: #1e293b; border: 3px solid #475569; border-radius: 15px; padding: 15px; min-height: 200px; }
        .room-title { color: #3b82f6; font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        
        .card { background: #334155; padding: 10px; margin-bottom: 10px; border-radius: 5px; cursor: pointer; border: 1px solid #475569; }
        .card:hover { background: #475569; border-color: #3b82f6; }
        
        .item { display: inline-block; width: 60px; height: 60px; background: #0f172a; border: 1px solid #3b82f6; border-radius: 10px; text-align: center; margin: 5px; padding: 5px; font-size: 25px; cursor: pointer; }
        
        .status { padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 14px; margin-top: 10px; display: inline-block; }
        .ok { background: #10b981; color: white; }
        .warn { background: #ef4444; color: white; animation: shake 0.2s infinite; }
        
        @keyframes shake { 0% { transform: translate(1px); } 50% { transform: translate(-1px); } 100% { transform: translate(1px); } }
        button { padding: 10px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
            <h2 style="margin:0;">🏠 STEM Архитект: Електрически План</h2>
            <p style="margin:5px 0 0 0; color:#10b981;">Бюджет: <span id="budgetDisplay">250</span> €</p>
        </div>
        <div>
            <button style="background:#ef4444; color:white;" onclick="location.reload()">🧹 Нулирай</button>
            <button style="background:#3b82f6; color:white; margin-left:10px;" onclick="window.print()">🖨️ Печат</button>
        </div>
    </div>
</div>

<div class="content">
    <div class="sidebar">
        <h3 style="margin-top:0;">📦 Склад</h3>
        <div id="catalog"></div>
    </div>

    <div class="main">
        <div class="room" id="room1">
            <div class="room-title">🥘 КУХНЯ</div>
            <div style="margin-bottom:15px;">
                <select id="wire1" onchange="update()">
                    <option value="13">Кабел 1.5mm² (13A) - 10€</option>
                    <option value="20" selected>Кабел 2.5mm² (20A) - 20€</option>
                </select>
                <select id="fuse1" onchange="update()">
                    <option value="10">Бушон 10A - 5€</option>
                    <option value="16" selected>Бушон 16A - 5€</option>
                </select>
            </div>
            <div id="grid1"></div>
            <div id="status1" class="status ok">СИСТЕМАТА Е OK</div>
            <div style="font-size:12px; margin-top:10px; color:#94a3b8;" id="info1">0A | 0W</div>
        </div>

        <div class="room" id="room2">
            <div class="room-title">🛋️ ДНЕВНА</div>
            <div style="margin-bottom:15px;">
                <select id="wire2" onchange="update()">
                    <option value="13" selected>Кабел 1.5mm² (13A) - 10€</option>
                    <option value="20">Кабел 2.5mm² (20A) - 20€</option>
                </select>
                <select id="fuse2" onchange="update()">
                    <option value="10" selected>Бушон 10A - 5€</option>
                    <option value="16">Бушон 16A - 5€</option>
                </select>
            </div>
            <div id="grid2"></div>
            <div id="status2" class="status ok">СИСТЕМАТА Е OK</div>
            <div style="font-size:12px; margin-top:10px; color:#94a3b8;" id="info2">0A | 0W</div>
        </div>
    </div>
</div>

                </div>`;
