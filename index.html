<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>STEM Лаборатория: Енергиен Мениджър</title>
    <style>
        :root { --bg: #f4f7f6; --dark: #2c3e50; --accent: #3498db; --danger: #e74c3c; --success: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        
        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        
        /* Списък с уреди */
        .appliance-list { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: 85vh; overflow-y: auto; }
        .appliance-card { 
            border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-bottom: 15px; 
            cursor: pointer; transition: 0.3s; position: relative;
        }
        .appliance-card:hover { border-color: var(--accent); background: #f0f7ff; }
        .appliance-card h4 { margin: 0 0 10px 0; display: flex; align-items: center; gap: 10px; }
        .info-row { font-size: 12px; color: #666; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

        /* Електрическо табло */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .circuit { 
            background: white; border-radius: 15px; padding: 20px; min-height: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--accent);
            position: relative;
        }
        .circuit.overloaded { border-top-color: var(--danger); background: #fff5f5; }
        
        .fuse-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .fuse-status { font-weight: bold; padding: 5px 10px; border-radius: 5px; font-size: 14px; }
        
        .active-apps { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .placed-item { 
            background: var(--dark); color: white; padding: 10px; border-radius: 8px; 
            text-align: center; position: relative; font-size: 12px; animation: popIn 0.3s;
        }
        .remove-btn { position: absolute; top: -5px; right: -5px; background: var(--danger); border: none; border-radius: 50%; color: white; width: 20px; height: 20px; cursor: pointer; }

        .physics-panel { 
            grid-column: 1 / -1; background: var(--dark); color: white; padding: 20px; 
            border-radius: 15px; display: flex; justify-content: space-around; align-items: center;
        }
        .stat-box { text-align: center; }
        .stat-box big { display: block; font-size: 30px; color: #f1c40f; font-weight: bold; }

        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<h2 style="text-align:center;">🏠 Инженерна Симулация: Разпределение на Товар</h2>

<div class="main-grid">
    <div class="appliance-list">
        <h3>🛒 Избор на уреди</h3>
        <p style="font-size: 12px; color: #666;">Кликни, за да добавиш към мрежата</p>
        
        <div id="catalog"></div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 20px;">
        <div class="dashboard">
            <div id="circuit1" class="circuit" ondragover="event.preventDefault()" ondrop="drop(event, 1)">
                <div class="fuse-box">
                    <span>🔌 КРЪГ А: Кухня</span>
                    <span id="fuse1-label" class="fuse-status" style="background: var(--success); color: white;">OK</span>
                </div>
                <div id="apps1" class="active-apps"></div>
                <div style="margin-top:20px; font-size:13px; color:#555;">
                    Ток: <b id="c1-i">0.00</b> A | Мощност: <b id="c1-p">0</b> W
                </div>
            </div>

            <div id="circuit2" class="circuit" ondragover="event.preventDefault()" ondrop="drop(event, 2)">
                <div class="fuse-box">
                    <span>🔌 КРЪГ Б: Стаи</span>
                    <span id="fuse2-label" class="fuse-status" style="background: var(--success); color: white;">OK</span>
                </div>
                <div id="apps2" class="active-apps"></div>
                <div style="margin-top:20px; font-size:13px; color:#555;">
                    Ток: <b id="c2-i">0.00</b> A | Мощност: <b id="c2-p">0</b> W
                </div>
            </div>
        </div>

        <div class="physics-panel">
            <div class="stat-box">
                <label>ОБЩ ТОК</label>
                <big id="total-i">0.00 A</big>
            </div>
            <div class="stat-box">
                <label>ОБЩА МОЩНОСТ</label>
                <big id="total-p">0 W</big>
            </div>
            <div class="stat-box">
                <label>НАПРЕЖЕНИЕ</label>
                <big>220 V</big>
            </div>
            <div style="max-width: 300px; font-size: 13px; border-left: 1px solid #555; padding-left: 20px;">
                <b>Закони:</b><br>
                $P = U \cdot I$<br>
                $I = P / U$<br>
                $R = U / I$
            </div>
        </div>
    </div>
</div>

<script>
    const U = 220;
    const FUSE_LIMIT = 16; // Ампера на предпазител

    const appliances = [
        { name: "Готварска печка", icon: "🔥", p: 3000 },
        { name: "Бойлер", icon: "🛁", p: 2500 },
        { name: "Пералня", icon: "🧺", p: 2000 },
        { name: "Микровълнова", icon: "🍱", p: 1200 },
        { name: "Ютия", icon: "🧶", p: 1800 },
        { name: "Компютър", icon: "🖥️", p: 400 },
        { name: "Хладилник", icon: "❄️", p: 600 },
        { name: "Телевизор", icon: "📺", p: 150 },
        { name: "Кафемашина", icon: "☕", p: 1000 },
        { name: "Ел. кана", icon: "🫖", p: 2200 }
    ];

    let state = { c1: [], c2: [] };

    function init() {
        const catalog = document.getElementById('catalog');
        appliances.forEach((app, index) => {
            const current = (app.p / U).toFixed(2);
            const resistance = (U / current).toFixed(1);
            
            catalog.innerHTML += `
                <div class="appliance-card">
                    <h4>${app.icon} ${app.name}</h4>
                    <div class="info-row">
                        <span>P: <b>${app.p}W</b></span>
                        <span>U: <b>220V</b></span>
                        <span>I: <b>${current}A</b></span>
                        <span>R: <b>${resistance}Ω</b></span>
                    </div>
                    <div style="margin-top:10px;">
                        <button onclick="addToCircuit(${index}, 1)" style="font-size:11px; cursor:pointer;">+ Кръг А</button>
                        <button onclick="addToCircuit(${index}, 2)" style="font-size:11px; cursor:pointer;">+ Кръг Б</button>
                    </div>
                </div>
            `;
        });
    }

    function addToCircuit(appIndex, circuitNum) {
        const app = { ...appliances[appIndex], instanceId: Date.now() };
        state['c' + circuitNum].push(app);
        updateUI();
    }

    function removeApp(instanceId, circuitNum) {
        state['c' + circuitNum] = state['c' + circuitNum].filter(a => a.instanceId !== instanceId);
        updateUI();
    }

    function updateUI() {
        [1, 2].forEach(num => {
            const container = document.getElementById('apps' + num);
            const list = state['c' + num];
            container.innerHTML = '';
            
            let pTotal = 0;
            list.forEach(app => {
                pTotal += app.p;
                container.innerHTML += `
                    <div class="placed-item">
                        <button class="remove-btn" onclick="removeApp(${app.instanceId}, ${num})">×</button>
                        <div style="font-size:20px;">${app.icon}</div>
                        <div>${app.name}</div>
                    </div>
                `;
            });

            const iTotal = pTotal / U;
            document.getElementById(`c${num}-p`).innerText = pTotal;
            document.getElementById(`c${num}-i`).innerText = iTotal.toFixed(2);
            
            const label = document.getElementById(`fuse${num}-label`);
            const circuitDiv = document.getElementById(`circuit${num}`);
            
            if (iTotal > FUSE_LIMIT) {
                label.innerText = "ИЗГОРЯЛ!";
                label.style.background = "var(--danger)";
                circuitDiv.classList.add('overloaded');
            } else {
                label.innerText = "OK";
                label.style.background = "var(--success)";
                circuitDiv.classList.remove('overloaded');
            }
        });

        const totalP = state.c1.reduce((s, a) => s + a.p, 0) + state.c2.reduce((s, a) => s + a.p, 0);
        document.getElementById('total-p').innerText = totalP + " W";
        document.getElementById('total-i').innerText = (totalP / U).toFixed(2) + " A";
    }

    init();
</script>

</body>
</html>
