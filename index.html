<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>STEM Архитект 7.0</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .main { display: flex; gap: 15px; flex: 1; overflow: hidden; }
        
        /* Склад */
        .sidebar { width: 220px; background: #1e293b; padding: 15px; border-radius: 10px; border: 1px solid #334155; overflow-y: auto; }
        .app-btn { background: #334155; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; width: 100%; text-align: left; transition: 0.2s; }
        .app-btn:hover { background: #3b82f6; border-color: white; }

        /* Стаи */
        .canvas { flex: 1; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .room { background: #1e293b; border: 3px solid #475569; border-radius: 15px; padding: 15px; }
        .room-title { color: #3b82f6; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        
        .device-grid { display: flex; flex-wrap: wrap; gap: 10px; min-height: 50px; margin: 10px 0; }
        .item { font-size: 30px; background: #0f172a; border: 1px solid #3b82f6; border-radius: 10px; padding: 5px; cursor: pointer; }
        
        .status { padding: 5px 10px; border-radius: 5px; font-weight: bold; display: inline-block; font-size: 12px; }
        .ok { background: #10b981; }
        .danger { background: #ef4444; animation: shake 0.2s infinite; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(2px); } }
        select { background: #0f172a; color: white; border: 1px solid #475569; border-radius: 5px; padding: 3px; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h3 style="margin:0;">🏠 STEM Архитект: Електрически План</h3>
        <span id="budget-tag" style="color:#10b981">Бюджет: <span id="budget">250</span> €</span>
    </div>
    <button onclick="location.reload()" style="background:#ef4444; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Нулирай</button>
</div>

<div class="main">
    <div class="sidebar">
        <h4 style="margin-top:0;">📦 Склад</h4>
        <button class="app-btn" onclick="add('🔥 Печка', 3000, 60, 1)">🔥 Печка (3kW)</button>
        <button class="app-btn" onclick="add('🚿 Бойлер', 2500, 55, 1)">🚿 Бойлер (2.5kW)</button>
        <button class="app-btn" onclick="add('🫖 Кана', 2000, 15, 1)">🫖 Кана (2kW)</button>
        <button class="app-btn" onclick="add('❄️ Хладилник', 300, 35, 1)">❄️ Хладилник</button>
        <button class="app-btn" onclick="add('🖥️ Компютър', 400, 30, 2)">🖥️ Компютър</button>
        <button class="app-btn" onclick="add('📺 ТВ', 150, 20, 2)">📺 ТВ</button>
        <button class="app-btn" onclick="add('❄️ Климатик', 1500, 50, 2)">❄️ Климатик</button>
        <button class="app-btn" onclick="add('💡 Лампа', 60, 5, 2)">💡 Лампа</button>
    </div>

    <div class="canvas">
        <div class="room" id="room1">
            <div class="room-title">🥘 КУХНЯ</div>
            <select id="wire1" onchange="update()">
                <option value="13">Кабел 1.5mm² (13A)</option>
                <option value="20" selected>Кабел 2.5mm² (20A)</option>
            </select>
            <select id="fuse1" onchange="update()">
                <option value="10">Бушон 10A</option>
                <option value="16" selected>Бушон 16A</option>
            </select>
            <div id="grid1" class="device-grid"></div>
            <div id="status1" class="status ok">OK</div>
            <div style="font-size:11px; margin-top:5px; color:#94a3b8;" id="info1">0A | 0W</div>
        </div>

        <div class="room" id="room2">
            <div class="room-title">🛋️ ДНЕВНА</div>
            <select id="wire2" onchange="update()">
                <option value="13" selected>Кабел 1.5mm² (13A)</option>
                <option value="20">Кабел 2.5mm² (20A)</option>
            </select>
            <select id="fuse2" onchange="update()">
                <option value="10" selected>Бушон 10A</option>
                <option value="16">Бушон 16A</option>
            </select>
            <div id="grid2" class="device-grid"></div>
            <div id="status2" class="status ok">OK</div>
            <div style="font-size:11px; margin-top:5px; color:#94a3b8;" id="info2">0A | 0W</div>
        </div>
    </div>
</div>

<script>
    let state = { 1: [], 2: [] };

    function add(name, p, cost, room) {
        state[room].push({ name, p, cost, id: Date.now() });
        update();
    }

    function remove(room, id) {
        state[room] = state[room].filter(x => x.id !== id);
        update();
    }

    function update() {
        let budget = 250;
        for (let n = 1; n <= 2; n++) {
            const wire = parseInt(document.getElementById('wire' + n).value);
            const fuse = parseInt(document.getElementById('fuse' + n).value);
            const grid = document.getElementById('grid' + n);
            const status = document.getElementById('status' + n);

            // Разходи за инсталация
            budget -= (wire === 13 ? 10 : 20);
            budget -= 5;

            grid.innerHTML = '';
            let watts = 0;
            state[n].forEach(item => {
                watts += item.p;
                budget -= item.cost;
                grid.innerHTML += `<span class="item" onclick="remove(${n}, ${item.id})">${item.name.split(' ')[0]}</span>`;
            });

            const amps = watts / 220;
            document.getElementById('info' + n).innerText = amps.toFixed(1) + " A | " + watts + " W";

            if (amps > fuse) {
                status.innerText = "🛑 БУШОНЪТ ПАДНА";
                status.className = "status danger";
            } else if (amps > wire) {
                status.innerText = "🔥 КАБЕЛЪТ ПРЕГРЯ";
                status.className = "status danger";
            } else {
                status.innerText = "✅ СИСТЕМАТА Е OK";
                status.className = "status ok";
            }
        }
        document.getElementById('budget').innerText = budget;
        document.getElementById('budget-tag').style.color = budget < 0 ? "#ef4444" : "#10b981";
    }
</script>
</body>
</html>
