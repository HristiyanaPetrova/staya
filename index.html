<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>STEM Архитект: Pro Edition</title>
    <script>
        let placedDevices = { 1: [], 2: [] };
        let draggedData = null;

        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev, icon, power, price, name) { draggedData = { icon, power, price, name }; }

        function drop(ev, roomNum) {
            ev.preventDefault();
            const rect = ev.currentTarget.getBoundingClientRect();
            const x = ev.clientX - rect.left - 25;
            const y = ev.clientY - rect.top - 25;
            placedDevices[roomNum].push({ ...draggedData, id: Date.now(), x, y });
            renderRoom(roomNum);
            calc();
        }

        function renderRoom(num) {
            const roomEl = document.getElementById('room-' + num);
            roomEl.querySelectorAll('.placed-item').forEach(el => el.remove());
            placedDevices[num].forEach(dev => {
                const div = document.createElement('div');
                div.className = 'placed-item';
                div.style.left = dev.x + 'px'; div.style.top = dev.y + 'px';
                div.innerHTML = `${dev.icon}<small>${dev.power}W</small><div class="remove-btn" onclick="removeItem(${num}, ${dev.id})">×</div>`;
                div.onmousedown = (e) => startMove(e, dev, num);
                roomEl.appendChild(div);
            });
        }

        function removeItem(num, id) {
            placedDevices[num] = placedDevices[num].filter(d => d.id !== id);
            renderRoom(num); calc();
        }

        function calc() {
            let budget = 250;
            let summaryHtml = "";
            for (let r = 1; r <= 2; r++) {
                const wire = parseInt(document.getElementById('w-' + r).value);
                const fuse = parseInt(document.getElementById('f-' + r).value);
                const statusEl = document.getElementById('status-' + r);
                const warnEl = document.getElementById('warn-' + r);
                const roomEl = document.getElementById('room-' + r);
                budget -= (wire === 13 ? 10 : 20); budget -= 5;
                let totalW = 0;
                let roomDevices = [];
                placedDevices[r].forEach(d => { 
                    totalW += d.power; budget -= d.price;
                    roomDevices.push(`${d.name} (${d.power}W)`);
                });
                const amps = totalW / 220;
                statusEl.innerText = `${amps.toFixed(1)}A | ${totalW}W`;
                if (amps > fuse || amps > wire) {
                    roomEl.classList.add('danger'); warnEl.style.display = 'block';
                } else {
                    roomEl.classList.remove('danger'); warnEl.style.display = 'none';
                }
                summaryHtml += `<tr><td>${r===1?'Кухня':'Дневна'}</td><td>${roomDevices.join(', ') || 'Няма'}</td><td>${totalW} W</td><td>${amps.toFixed(1)} A</td></tr>`;
            }
            document.getElementById('budget').innerText = budget;
            document.getElementById('print-table-body').innerHTML = summaryHtml;
            document.getElementById('print-budget').innerText = budget;
            document.getElementById('print-name').innerText = document.getElementById('studentName').value || "---";
        }

        function startMove(e, dev, num) {
            if (e.target.className === 'remove-btn') return;
            const rect = document.getElementById('room-' + num).getBoundingClientRect();
            document.onmousemove = (m) => {
                dev.x = m.clientX - rect.left - 25; dev.y = m.clientY - rect.top - 25;
                renderRoom(num);
            };
            document.onmouseup = () => { document.onmousemove = null; calc(); };
        }
    </script>
    <style>
        /* Анимиран фон */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .header { 
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .main-layout { display: flex; gap: 15px; flex: 1; min-height: 0; }

        /* Странична лента с ефекти */
        .sidebar { 
            width: 240px; background: rgba(30, 41, 59, 0.5); padding: 15px; border-radius: 15px; 
            overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); 
        }
        .source-item { 
            background: #334155; padding: 10px; border-radius: 8px; margin-bottom: 8px; 
            cursor: grab; font-size: 13px; border: 1px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
