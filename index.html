<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Архитект 8.0</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .main-layout { display: flex; gap: 15px; flex: 1; overflow: hidden; }
        
        /* Склад с фиксирани бутони */
        .sidebar { width: 240px; background: #1e293b; padding: 15px; border-radius: 12px; border: 1px solid #334155; overflow-y: auto; }
        .app-item { background: #334155; border: 1px solid #475569; color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; width: 100%; text-align: left; display: block; }
        .app-item:hover { background: #3b82f6; border-color: white; }
        .app-item b { display: block; font-size: 14px; }
        .app-item span { font-size: 11px; color: #94a3b8; }

        /* Стаи */
        .rooms-area { flex: 1; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .room-box { background: #1e293b; border: 3px solid #475569; border-radius: 15px; padding: 15px; }
        .room-title { color: #60a5fa; font-size: 18px; font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        .device-slot { display: flex; flex-wrap: wrap; gap: 8px; min-height: 60px; margin: 10px 0; border: 1px dashed #475569; padding: 10px; border-radius: 8px; }
        .active-dev { font-size: 24px; background: #0f172a; border: 1px solid #3b82f6; border-radius: 8px; padding: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 45px; height: 45px; }
        
        .status-pill { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .bg-ok { background: #10b981; }
        .bg-err { background: #ef4444; animation: blink 0.5s infinite; }
        
        @keyframes blink { 50% { opacity: 0.7; } }
        select { background: #0f172a; color: white; border: 1px solid #475569; padding: 4px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h3 style="margin:0;">🏠 STEM Архитект: Електрически План</h3>
        <div style="margin-top:5px;">Бюджет: <b id="total-budget" style="color:#10b981">250</b> €</div>
    </div>
    <button onclick="window.location.reload()" style="background:#475569; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer;">🔄 Нулирай</button>
</div>

<div class="main-layout">
    <div class="sidebar">
        <h4 style="margin-top:0; color:#94a3b8;">📦 Добави уред:</h4>
        
        <button class="app-item" onclick="addItem('🔥', 3000, 60, 1)">
            <b>🔥 Готварска печка</b><span>3000W | 60€ (Кухня)</span>
        </button>
        
        <button class="app-item" onclick="addItem('🚿', 2500, 55, 1)">
            <b>🚿 Бойлер</b><span>2500W | 55€ (Кухня)</span>
        </button>
        
        <button class="app-item" onclick="addItem('🫖', 2000, 15, 1)">
            <b>🫖 Ел. кана</b><span>2000W | 15€ (Кухня)</span>
        </button>
        
        <button class="app-item" onclick="addItem('❄️', 300, 35, 1)">
            <b>❄️ Хладилник</b><span>300W | 35€ (Кухня)</span>
        </button>

        <button class="app-item" onclick="addItem('❄️', 1500, 50, 2)">
            <b>❄️ Климатик</b><span>1500W | 50€ (Дневна)</span>
        </button>

        <button class="app-item" onclick="addItem('🖥️', 450, 30, 2)">
            <b>🖥️ Компютър</b><span>450W | 30€ (Дневна)</span>
        </button>

        <button class="app-item" onclick="addItem('📺', 150, 20, 2)">
            <b>📺 Телевизор</b><span>150W | 20€ (Дневна)</span>
        </button>

        <button class="app-item" onclick="addItem('💡', 60, 5, 2)">
            <b>💡 Лампа</b><span>60W | 5€ (Дневна)</span>
        </button>
    </div>

    <div class="rooms-area">
        <div class="room-box">
            <div class="room-title">
                <span>🥘 КУХНЯ</span>
                <span id="status-1" class="status-pill bg-ok">СИСТЕМАТА Е OK</span>
            </div>
            <div style="display:flex; gap:10px;">
                <select id="w-1" onchange="calc()">
                    <option value="13">Кабел 1.5mm² (13A Max)</option>
                    <option value="20" selected>Кабел 2.5mm² (20A Max)</option>
                </select>
                <select id="f-1" onchange="calc()">
                    <option value="10">Бушон 10A</option>
                    <option value="16" selected>Бушон 16A</option>
                    <option value="25">Бушон 25A</option>
                </select>
            </div>
            <div id="grid-1" class="device-slot"></div>
            <div id="info-1" style="font-size:11px; color:#94a3b8;">0A | 0W</div>
        </div>

        <div class="room-box">
            <div class="room-title">
                <span>🛋️ ДНЕВНА</span>
                <span id="status-2" class="status-pill bg-ok">СИСТЕМАТА Е OK</span>
            </div>
            <div style="display:flex; gap:10px;">
                <select id="w-2" onchange="calc()">
                    <option value="13" selected>Кабел 1.5mm² (13A Max)</option>
                    <option value="20">Кабел 2.5mm² (20A Max)</option>
                </select>
                <select id="f-2" onchange="calc()">
                    <option value="10" selected>Бушон 10A</option>
                    <option value="16">Бушон 16A</option>
                </select>
            </div>
            <div id="grid-2" class="device-slot"></div>
            <div id="info-2" style="font-size:11px; color:#94a3b8;">0A | 0W</div>
        </div>
    </div>
</div>

<script>
    let house = { 1: [], 2: [] };

    function addItem(icon, power, price, room) {
        house[room].push({ icon, power, price, id: Date.now() });
        calc();
    }

    function removeItem(room, id) {
        house[room] = house[room].filter(x => x.id !== id);
        calc();
    }

    function calc() {
        let budget = 250;
        for (let r = 1; r <= 2; r++) {
            const wire = parseInt(document.getElementById('w' + '-' + r).value);
            const fuse = parseInt(document.getElementById('f' + '-' + r).value);
            const grid = document.getElementById('grid' + '-' + r);
            const status = document.getElementById('status' + '-' + r);

            // Инсталационни разходи
            budget -= (wire === 13 ? 10 : 20);
            budget -= (fuse > 16 ? 10 : 5);

            grid.innerHTML = '';
            let totalW = 0;
            house[r].forEach(item => {
                totalW += item.power;
                budget -= item.price;
                grid.innerHTML += `<div class="active-dev" onclick="removeItem(${r}, ${item.id})">${item.icon}</div>`;
            });

            const currentA = totalW / 220;
            document.getElementById('info-' + r).innerText = currentA.toFixed(1) + " Amps | " + totalW + " Watts";

            if (currentA > fuse) {
                status.innerText = "🚨 БУШОНЪТ ИЗКЛЮЧИ";
                status.className = "status-pill bg-err";
            } else if (currentA > wire) {
                status.innerText = "🔥 КАБЕЛЪТ ПРЕТОВАРИ";
                status.className = "status-pill bg-err";
            } else {
                status.innerText = "✅ СИСТЕМАТА Е OK";
                status.className = "status-pill bg-ok";
            }
        }
        document.getElementById('total-budget').innerText = budget;
        document.getElementById('total-budget').style.color = budget < 0 ? "#ef4444" : "#10b981";
    }

    // Стартираме калкулацията веднъж при зареждане
    calc();
</script>
</body>
</html>
