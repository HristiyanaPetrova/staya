<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>STEM Проектиране</title>
    <script>
        // Слагаме логиката най-горе за по-бързо зареждане
        let placedDevices = { 1: [], 2: [] };
        let draggedData = null;

        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev, icon, power, price) { draggedData = { icon, power, price }; }

        function drop(ev, roomNum) {
            ev.preventDefault();
            const rect = ev.currentTarget.getBoundingClientRect();
            const x = ev.clientX - rect.left - 25;
            const y = ev.clientY - rect.top - 25;
            placedDevices[roomNum].push({ ...draggedData, id: Date.now(), x, y });
            renderRoom(roomNum);
            calc();
        }

        function renderRoom(num) {
            const roomEl = document.getElementById('room-' + num);
            roomEl.querySelectorAll('.placed-item').forEach(el => el.remove());
            placedDevices[num].forEach(dev => {
                const div = document.createElement('div');
                div.className = 'placed-item';
                div.style.left = dev.x + 'px'; div.style.top = dev.y + 'px';
                div.innerHTML = `${dev.icon}<small>${dev.power}W</small><div class="remove-btn" onclick="removeItem(${num}, ${dev.id})">×</div>`;
                div.onmousedown = (e) => startMove(e, dev, num);
                roomEl.appendChild(div);
            });
        }

        function removeItem(num, id) {
            placedDevices[num] = placedDevices[num].filter(d => d.id !== id);
            renderRoom(num); calc();
        }

        function calc() {
            let budget = 250;
            for (let r = 1; r <= 2; r++) {
                const wire = parseInt(document.getElementById('w-' + r).value);
                const fuse = parseInt(document.getElementById('f-' + r).value);
                const statusEl = document.getElementById('status-' + r);
                const warnEl = document.getElementById('warn-' + r);
                const roomEl = document.getElementById('room-' + r);

                budget -= (wire === 13 ? 10 : 20); budget -= 5;
                let totalW = 0;
                placedDevices[r].forEach(d => { totalW += d.power; budget -= d.price; });

                const amps = totalW / 220;
                statusEl.innerText = `${amps.toFixed(1)}A | ${totalW}W`;

                if (amps > fuse || amps > wire) {
                    roomEl.classList.add('danger'); warnEl.style.display = 'block';
                } else {
                    roomEl.classList.remove('danger'); warnEl.style.display = 'none';
                }
            }
            document.getElementById('budget').innerText = budget;
        }

        function startMove(e, dev, num) {
            if (e.target.className === 'remove-btn') return;
            const rect = document.getElementById('room-' + num).getBoundingClientRect();
            document.onmousemove = (m) => {
                dev.x = m.clientX - rect.left - 25; dev.y = m.clientY - rect.top - 25;
                renderRoom(num);
            };
            document.onmouseup = () => { document.onmousemove = null; calc(); };
        }
    </script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #1e293b; padding: 10px; border-radius: 10px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .main-layout { display: flex; gap: 10px; flex: 1; min-height: 0; }
        .sidebar { width: 200px; background: #1e293b; padding: 10px; border-radius: 10px; overflow-y: auto; }
        .source-item { background: #334155; padding: 8px; border-radius: 5px; margin-bottom: 5px; cursor: grab; font-size: 13px; border: 1px solid #475569; }
        .rooms-container { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .room { background: #1e293b; border: 3px solid #475569; border-radius: 10px; position: relative; flex: 1; }
        .room-label { position: absolute; top: 5px; left: 10px; font-weight: bold; font-size: 12px; background: rgba(0,0,0,0.5); padding: 2px 5px; }
        .placed-item { position: absolute; width: 45px; height: 45px; background: #0f172a; border: 2px solid #3b82f6; border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 18px; }
        .placed-item small { font-size: 8px; }
        .remove-btn { position: absolute; top: -8px; right: -8px; background: red; color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; cursor: pointer; text-align: center; line-height: 16px; }
        .overload-msg { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); background: red; color: white; padding: 2px 10px; border-radius: 10px; font-weight: bold; display: none; }
        .danger { border-color: red !important; }
        .status-info { position: absolute; bottom: 5px; right: 10px; font-size: 10px; }
        .controls { position: absolute; top: 5px; right: 10px; z-index: 10; }
        input[type="text"] { background: #0f172a; color: white; border: 1px solid #475569; padding: 5px; border-radius: 4px; }
        @media print { .sidebar, .header button, .controls, .remove-btn { display: none !important; } body { background: white; color: black; } .room { border: 2px solid black !important; margin-bottom: 10px; } }
    </style>
</head>
<body>

<div class="header">
    <div>
        <input type="text" id="studentName" placeholder="Име на ученика..." style="width: 200px;">
        <span style="margin-left:15px; color:#10b981;">Бюджет: <b id="budget">250</b> €</span>
    </div>
    <div>
        <button onclick="window.print()" style="padding:5px 10px; cursor:pointer;">🖨️ Печат</button>
        <button onclick="location.reload()" style="padding:5px 10px; cursor:pointer;">🔄 Нулирай</button>
    </div>
</div>

<div class="main-layout">
    <div class="sidebar">
        <div class="source-item" draggable="true" ondragstart="drag(event, '🔥', 3000, 60)">🔥 Печка (3kW)</div>
        <div class="source-item" draggable="true" ondragstart="drag(event, '🚿', 2500, 55)">🚿 Бойлер (2.5)</div>
        <div class="source-item" draggable="true" ondragstart="drag(event, '🫖', 2000, 15)">🫖 Кана (2kW)</div>
        <div class="source-item" draggable="true" ondragstart="drag(event, '❄️', 300, 35)">❄️ Хладилник</div>
        <div class="source-item" draggable="true" ondragstart="drag(event, '🖥️', 450, 30)">🖥️ Компютър</div>
        <div class="source-item" draggable="true" ondragstart="drag(event, '📺', 150, 20)">📺 Телевизор</div>
        <div class="source-item" draggable="true" ondragstart="drag(event, '💡', 60, 5)">💡 Лампа</div>
    </div>

    <div class="rooms-container">
        <div id="room-1" class="room" ondrop="drop(event, 1)" ondragover="allowDrop(event)">
            <div class="room-label">🥘 КУХНЯ</div>
            <div id="warn-1" class="overload-msg">ПРЕТОВАРЕНО!</div>
            <div class="controls">
                <select id="w-1" onchange="calc()"><option value="13">1.5mm²</option><option value="20" selected>2.5mm²</option></select>
                <select id="f-1" onchange="calc()"><option value="10">10A</option><option value="16" selected>16A</option></select>
            </div>
            <div class="status-info" id="status-1">0A | 0W</div>
        </div>

        <div id="room-2" class="room" ondrop="drop(event, 2)" ondragover="allowDrop(event)">
            <div class="room-label">🛋️ ДНЕВНА</div>
            <div id="warn-2" class="overload-msg">ПРЕТОВАРЕНО!</div>
            <div class="controls">
                <select id="w-2" onchange="calc()"><option value="13" selected>1.5mm²</option><option value="20">2.5mm²</option></select>
                <select id="f-2" onchange="calc()"><option value="10" selected>10A</option><option value="16">16A</option></select>
            </div>
            <div class="status-info" id="status-2">0A | 0W</div>
        </div>
    </div>
</div>

</body>
</html>
